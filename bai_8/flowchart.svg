<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="600" viewBox="0 0 900 600">
  <style>
    .box { fill:#f8f9fb; stroke:#2b6cb0; stroke-width:2 }
    .dec { fill:#fff7ed; stroke:#d69e2e; stroke-width:2 }
    .text { font:14px sans-serif; }
  </style>
  <rect x="320" y="20" width="260" height="50" rx="6" class="box"/>
  <text x="450" y="50" class="text" text-anchor="middle">Start</text>

  <rect x="280" y="100" width="340" height="60" rx="6" class="box"/>
  <text x="450" y="135" class="text" text-anchor="middle">Input: num_members, base_fee, earlyBirdFlag, promoCode</text>

  <rect x="280" y="200" width="340" height="60" rx="6" class="box"/>
  <text x="450" y="235" class="text" text-anchor="middle">total = 0; i = 1</text>

  <rect x="280" y="300" width="340" height="60" rx="6" class="dec"/>
  <text x="450" y="335" class="text" text-anchor="middle">Loop while i <= num_members: total += base_fee; i++</text>

  <rect x="280" y="400" width="340" height="60" rx="6" class="box"/>
  <text x="450" y="435" class="text" text-anchor="middle">If earlyBirdFlag then total *= (1 - earlyDiscount)</text>

  <rect x="120" y="520" width="650" height="50" rx="6" class="box"/>
  <text x="450" y="553" class="text" text-anchor="middle">If promoCode valid then apply promo (percentage or fixed); Output total; End</text>

  <!-- arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#2b6cb0"/>
    </marker>
  </defs>
  <line x1="450" y1="70" x2="450" y2="100" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="160" x2="450" y2="200" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="260" x2="450" y2="300" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="360" x2="450" y2="400" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="450" y1="460" x2="450" y2="520" stroke="#2b6cb0" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
