<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đảo ngược mảng</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            line-height: 1.6;
        }
        div {
            margin-bottom: 10px;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h3>Đảo Ngược Các Phần Tử Trong Mảng</h3>
    <div id="original"></div>
    <div id="result"></div>

    <script>
        let x = [-3, 5, 1, 3, 2, 10];
        
        document.getElementById("original").innerHTML = "Mảng ban đầu: [" + x + "]";

        let first = 0;
        let last = x.length - 1;

        while (first < last) {
            let b = x[first];
            x[first] = x[last];
            x[last] = b;
            first++;
            last--;
        }

        document.getElementById("result").innerHTML = "Mảng sau khi đảo ngược: [" + x + "]";
    </script>

</body>
</html>
